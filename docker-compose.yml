services:

  postgres:
    image: postgres:16
    container_name: flight-scout-postgres
    environment:
      POSTGRES_DB: flightscoutdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - flight-scout-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: flight-scout-redis
    ports:
      - "6380:6379"
    volumes:
      - flight-scout-redis-data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: flight-scout-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: flight-scout-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

volumes:
  flight-scout-postgres-data:
  flight-scout-redis-data: